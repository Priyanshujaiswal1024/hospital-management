spring.application.name=hospitalManagement

# ================= DATABASE =================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — connection pool optimize
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=120000
spring.datasource.hikari.data-source-properties.socketTimeout=60
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
# Hibernate — startup pe schema check fast karo
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# Fix: replaces deprecated use_jdbc_metadata_defaults
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ================= JPA =================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
#u
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=false

# ================= LAZY INIT (startup time fix) =================

server.servlet.load-on-startup=1

# Actuator health detail
# ================= ACTUATOR / HEALTH =================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
spring.mail.test-connection=false
management.health.mail.enabled=false
management.health.diskspace.enabled=true
management.health.db.enabled=true
management.health.defaults.enabled=true
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.readiness.include=db,ping
# ================= SERVER =================
server.port=${PORT:8080}
server.servlet.context-path=/api/v1
spring.main.lazy-initialization=true
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration


# ================= OAUTH2 =================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH_REDIRECT_URI}

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
# Redis health completely disable karo
management.health.redis.enabled=false
# ================= MAIL (Port 465 ? SSL) =================
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
#spring.mail.host=${SPRING_MAIL_HOST:in-v3.mailje}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
#
# ================= JWT =================
jwt.secretKey=${JWT_SECRET}

# ================= REDIS =================
spring.data.redis.url=${REDIS_URL}
spring.data.redis.ssl.enabled=true

# Timeouts
spring.data.redis.lettuce.command-timeout=3000ms
spring.data.redis.lettuce.shutdown-timeout=100ms

# Connection pool (prevents stale connections on free-tier)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=2
spring.data.redis.lettuce.pool.max-idle=1
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=2000ms

# ================= KAFKA =================
kafka.enabled=${KAFKA_ENABLED:true}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
#spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.consumer.group-id=hospital-email-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.priyanshu.hospitalmanagement.kafka.event
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.admin.fail-fast=false