<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Appointment Cancelled</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">
<div style="max-width: 600px; margin: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 30px;">
    <h2 style="color: #DC2626;">Appointment Cancelled ❌</h2>
    <p>Dear <strong th:text="${patientName}">Patient</strong>,</p>
    <p>Your appointment has been cancelled.</p>
    <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
        <tr style="background: #f5f5f5;">
            <td style="padding: 10px; font-weight: bold;">Doctor</td>
            <td style="padding: 10px;" th:text="${doctorName}">Dr. Name</td>
        </tr>
        <tr>
            <td style="padding: 10px; font-weight: bold;">Date & Time</td>
            <td style="padding: 10px;" th:text="${appointmentTime}">Date</td>
        </tr>
    </table>
    <p>You can book a new appointment anytime.</p>
    <p style="color: #888; font-size: 13px;">— MedCare Hospital Management System</p>
</div>
</body>
</html>
