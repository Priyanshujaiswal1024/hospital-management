<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reset Password</title></head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">
<div style="max-width: 600px; margin: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 30px;">
    <h2 style="color: #0B1D3A;">Password Reset Request 🔑</h2>
    <p>Dear User,</p>
    <p>Your OTP to reset your password is:</p>
    <div style="text-align: center; margin: 30px 0;">
        <span style="font-size: 36px; font-weight: bold; color: #2563EB; letter-spacing: 8px;" th:text="${otp}">123456</span>
    </div>
    <p>This OTP is valid for <strong>10 minutes</strong>.</p>
    <p style="color: #888; font-size: 13px;">— MedCare Hospital Management System</p>
</div>
</body>
</html>
