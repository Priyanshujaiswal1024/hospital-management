<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Bill Generated</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">

<div style="max-width: 600px; margin: auto; border: 1px solid #e0e0e0; border-radius: 8px; padding: 30px;">

    <h2 style="color: #0B1D3A;">Bill Generated 🧾</h2>

    <p>Dear <strong th:text="${patientName}">Patient</strong>,</p>

    <p>A bill has been generated for your recent appointment. Here are the details:</p>

    <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
        <tr style="background: #f5f5f5;">
            <td style="padding: 10px; font-weight: bold;">Doctor</td>
            <td style="padding: 10px;" th:text="${doctorName}">Dr. Name</td>
        </tr>
        <tr>
            <td style="padding: 10px; font-weight: bold;">Consultation Fee</td>
            <td style="padding: 10px;" th:text="${consultationFee}">0.0</td>
        </tr>
        <tr style="background: #f5f5f5;">
            <td style="padding: 10px; font-weight: bold;">GST (18%)</td>
            <td style="padding: 10px;" th:text="${gstAmount}">0.0</td>
        </tr>
        <tr>
            <td style="padding: 10px; font-weight: bold; color: #0B1D3A;">Total Amount</td>
            <td style="padding: 10px; font-weight: bold; color: #0B1D3A;" th:text="${totalAmount}">0.0</td>
        </tr>
        <tr style="background: #f5f5f5;">
            <td style="padding: 10px; font-weight: bold;">Status</td>
            <td style="padding: 10px; color: #D97706;"><strong>UNPAID</strong></td>
        </tr>
    </table>

    <p>Please clear the dues at the billing counter or online.</p>

    <p style="color: #888; font-size: 13px;">— MedCare Hospital Management System</p>

</div>

</body>
</html>
